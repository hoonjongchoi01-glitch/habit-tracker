<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="습관 트래커"/>
<title>습관 트래커</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Pretendard','Noto Sans KR',sans-serif;background:#f8fafc;min-height:100vh;}
  button{cursor:pointer;font-family:inherit;}
  input{font-family:inherit;}

  /* Lock screen */
  .lock-screen{position:fixed;inset:0;background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:16px;}
  .lock-icon{font-size:48px;}
  .lock-title{font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.5px;}
  .lock-sub{font-size:13px;color:rgba(255,255,255,.75);}
  .lock-input{width:200px;padding:12px 16px;border-radius:12px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;font-size:20px;text-align:center;letter-spacing:4px;outline:none;font-family:inherit;}
  .lock-input::placeholder{color:rgba(255,255,255,.4);letter-spacing:2px;}
  .lock-input:focus{border-color:rgba(255,255,255,.7);}
  .lock-btn{width:200px;padding:13px;background:#fff;color:#6366f1;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;}
  .lock-error{font-size:13px;color:#fca5a5;min-height:20px;}

  .header{background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);padding:24px 20px 20px;color:#fff;}
  .header-inner{max-width:520px;margin:0 auto;}
  .header-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;flex-shrink:0;}
  .sync-dot.syncing{background:#fbbf24;animation:pulse 1s infinite;}
  .sync-dot.error{background:#f87171;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  .header-date{font-size:13px;opacity:.85;margin-top:2px;}
  .sync-status{font-size:11px;opacity:.75;margin-top:2px;}
  .progress-card{margin-top:16px;background:rgba(255,255,255,.15);border-radius:16px;padding:14px 18px;}
  .progress-top{display:flex;justify-content:space-between;align-items:center;}
  .progress-label{font-size:14px;font-weight:600;}
  .progress-pct{font-size:26px;font-weight:800;}
  .progress-bar-bg{margin-top:10px;background:rgba(255,255,255,.3);border-radius:8px;height:8px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:#fff;border-radius:8px;transition:width .4s cubic-bezier(.4,0,.2,1);}
  .progress-sub{font-size:12px;opacity:.85;margin-top:6px;}

  .tabbar{background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:10;}
  .tabbar-inner{max-width:520px;margin:0 auto;display:flex;}
  .tab-btn{flex:1;padding:14px 0;border:none;background:none;font-size:13px;font-weight:600;color:#94a3b8;border-bottom:2px solid transparent;transition:all .2s;}
  .tab-btn.active{color:#6366f1;border-bottom:2px solid #6366f1;}

  .content{max-width:520px;margin:0 auto;padding:16px 16px 100px;}

  .loading-overlay{position:fixed;inset:0;background:rgba(248,250,252,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:16px;}
  .loading-spinner{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:14px;color:#64748b;font-weight:600;}

  .habit-card{display:flex;align-items:center;gap:12px;background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .18s;box-shadow:0 1px 3px #0000000a;}
  .habit-card.done{background:#e0e7ff;border-color:#6366f1;box-shadow:0 2px 8px #6366f122;}
  .habit-card.saving{opacity:0.6;pointer-events:none;}
  .check-circle{width:26px;height:26px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .18s;font-size:14px;color:#fff;}
  .habit-card.done .check-circle{background:#6366f1;}
  .habit-info{flex:1;min-width:0;}
  .habit-name{font-size:14px;font-weight:600;color:#1e293b;line-height:1.4;}
  .habit-card.done .habit-name{color:#6366f1;}
  .habit-streak{font-size:11px;color:#f59e0b;margin-top:2px;font-weight:600;}
  .habit-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;background:#f1f5f9;color:#cbd5e1;white-space:nowrap;flex-shrink:0;}
  .habit-card.done .habit-badge{background:#6366f118;color:#6366f1;}

  .week-card{background:#fff;border-radius:16px;padding:16px;margin-top:8px;border:1px solid #e2e8f0;}
  .week-label{font-size:13px;font-weight:700;color:#475569;margin-bottom:10px;}
  .week-grid{display:flex;gap:6px;justify-content:space-between;}
  .week-cell{flex:1;text-align:center;}
  .week-box{height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
  .week-day{font-size:10px;color:#94a3b8;margin-top:4px;}

  .stat-card{background:#fff;border-radius:16px;padding:20px;border:1px solid #e2e8f0;margin-bottom:12px;}
  .stat-title{font-size:14px;font-weight:700;color:#334155;margin-bottom:16px;}
  .bar-row{margin-bottom:10px;}
  .bar-row-top{display:flex;justify-content:space-between;margin-bottom:4px;gap:8px;}
  .bar-row-name{font-size:12px;color:#475569;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bar-row-pct{font-size:12px;font-weight:700;flex-shrink:0;}
  .bar-bg{background:#f1f5f9;border-radius:6px;height:6px;}
  .bar-fill{height:100%;border-radius:6px;transition:width .4s;}

  .export-btn{width:100%;margin-top:16px;padding:14px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;letter-spacing:-.3px;}
  .export-hint{font-size:11px;color:#94a3b8;text-align:center;margin-top:6px;}

  .manage-card{background:#fff;border-radius:16px;padding:16px;border:1px solid #e2e8f0;margin-bottom:12px;}
  .manage-title{font-size:14px;font-weight:700;color:#334155;margin-bottom:12px;}
  .add-row{display:flex;gap:8px;}
  .add-input{flex:1;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;}
  .add-input:focus{border-color:#6366f1;}
  .add-btn{background:#6366f1;color:#fff;border:none;border-radius:10px;padding:0 18px;font-weight:700;font-size:14px;}
  .habit-list-item{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #f1f5f9;}
  .habit-list-item:last-child{border-bottom:none;}
  .habit-num{font-size:13px;color:#64748b;min-width:20px;font-weight:600;}
  .habit-list-name{flex:1;font-size:13px;color:#334155;line-height:1.4;}
  .edit-input{flex:1;border:1.5px solid #6366f1;border-radius:8px;padding:6px 10px;font-size:13px;outline:none;}
  .btn-edit{background:#f1f5f9;border:none;border-radius:8px;padding:6px 10px;font-size:12px;color:#64748b;white-space:nowrap;}
  .btn-del{background:#fee2e2;border:none;border-radius:8px;padding:6px 10px;font-size:12px;color:#ef4444;white-space:nowrap;}
  .btn-save{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:13px;white-space:nowrap;}
  .notice{background:#e0f2fe;border:1px solid #7dd3fc;border-radius:14px;padding:14px;font-size:12px;color:#0369a1;line-height:1.8;}
  svg text{font-family:'Pretendard','Noto Sans KR',sans-serif;}
</style>
</head>
<body>

<!-- Lock Screen -->
<div id="lockScreen" class="lock-screen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">습관 트래커</div>
  <div class="lock-sub">비밀번호를 입력하세요</div>
  <input class="lock-input" type="password" id="lockInput" placeholder="••••" maxlength="20"/>
  <div class="lock-error" id="lockError"></div>
  <button class="lock-btn" id="lockBtn">확인</button>
</div>

<div id="loadingOverlay" class="loading-overlay" style="display:none;">
  <div class="loading-spinner"></div>
  <div class="loading-text">데이터 불러오는 중...</div>
</div>

<div id="app"></div>

<script>
const PASSWD = "1229";
const API_URL = "https://script.google.com/macros/s/AKfycbz9M_P1iuofe4oT6Tky5-gafLLvwCtRGutU1zrGalFRyfxPhhtjZgFPJvWKSDih7hXQ8Q/exec";

const DEFAULT_HABITS = [
  "아침 5시에 기상","아침 운동 (근력)","닛케이, 블룸버그 신문 읽기",
  "커피·에너지음료 2잔 이하","업무 보고서 2개 이상 개요 기획",
  "업무 자동화 툴 1개 이상 개요 기획","업무 관련 뉴스·구글 Alerts 정독",
  "저녁 식사 가볍게 + 금주","저녁 운동","SNS(유튜브) 10분 이하",
  "영어 회화 공부 15분 이상","중국어 공부 30분 이상","독서 1시간 이상",
  "걷기 2만보 이상","스페인어 또는 인도네시아어 30분 이상","오후 10시 이후 휴대폰 안 보기"
];

let habits = JSON.parse(localStorage.getItem("ht_habits")||"null") || DEFAULT_HABITS;
let records = JSON.parse(localStorage.getItem("ht_records")||"{}");
let currentTab = "today";
let editIdx = -1;
let syncStatus = "idle";
let lastSync = null;
let savingSet = new Set();

// ── Lock ─────────────────────────────────────────────────────────────────────
function checkLock(){
  const saved = sessionStorage.getItem("ht_auth");
  if(saved === PASSWD){
    document.getElementById("lockScreen").style.display="none";
    document.getElementById("loadingOverlay").style.display="flex";
    loadFromCloud();
  }
}
function bindLock(){
  const btn=document.getElementById("lockBtn");
  const inp=document.getElementById("lockInput");
  const err=document.getElementById("lockError");
  function tryUnlock(){
    if(inp.value===PASSWD){
      sessionStorage.setItem("ht_auth",PASSWD);
      document.getElementById("lockScreen").style.display="none";
      document.getElementById("loadingOverlay").style.display="flex";
      loadFromCloud();
    } else {
      err.textContent="비밀번호가 틀렸습니다.";
      inp.value="";
      inp.focus();
      setTimeout(()=>err.textContent="",2000);
    }
  }
  btn.addEventListener("click",tryUnlock);
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")tryUnlock();});
}

// ── API ──────────────────────────────────────────────────────────────────────
async function apiGet(key){const res=await fetch(`${API_URL}?key=${encodeURIComponent(key)}`);return(await res.json()).value;}
async function apiSet(key,value){await fetch(API_URL,{method:"POST",body:JSON.stringify({key,value})});}
async function loadFromCloud(){
  try{
    syncStatus="syncing";
    const [ch,cr]=await Promise.all([apiGet("habits"),apiGet("records")]);
    if(ch){habits=ch;localStorage.setItem("ht_habits",JSON.stringify(habits));}
    if(cr){records=cr;localStorage.setItem("ht_records",JSON.stringify(records));}
    syncStatus="ok";lastSync=new Date();
  }catch(e){syncStatus="error";}
  document.getElementById("loadingOverlay").style.display="none";
  render();
}
async function saveToCloud(){
  try{
    syncStatus="syncing";updateSyncUI();
    await Promise.all([apiSet("habits",habits),apiSet("records",records)]);
    localStorage.setItem("ht_habits",JSON.stringify(habits));
    localStorage.setItem("ht_records",JSON.stringify(records));
    syncStatus="ok";lastSync=new Date();
  }catch(e){syncStatus="error";}
  updateSyncUI();
}
function updateSyncUI(){
  const dot=document.querySelector(".sync-dot"),st=document.querySelector(".sync-status");
  if(!dot||!st)return;
  dot.className="sync-dot"+(syncStatus==="syncing"?" syncing":syncStatus==="error"?" error":"");
  st.textContent=syncStatus==="syncing"?"동기화 중...":syncStatus==="error"?"⚠️ 동기화 실패":
    lastSync?`마지막 동기화: ${lastSync.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}`:"대기 중";
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function todayKey(){
  var d=new Date();
  d.setTime(d.getTime()+(9*60*60*1000));
  return d.toISOString().slice(0,10);
}
function last7(){const a=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);a.push(d.toISOString().slice(0,10));}return a;}
function last30(){const a=[];for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);a.push(d.toISOString().slice(0,10));}return a;}
function calcStreak(h){let s=0;const d=new Date();while(true){const k=d.toISOString().slice(0,10);if(records[k]&&records[k][h]){s++;d.setDate(d.getDate()-1);}else break;}return s;}
function monthlyStats(){
  const map={};
  Object.entries(records).forEach(([date,checks])=>{
    const m=date.slice(0,7);
    if(!map[m])map[m]={total:0,done:0};
    map[m].total+=habits.length;
    map[m].done+=Object.values(checks).filter(Boolean).length;
  });
  return Object.entries(map).sort(([a],[b])=>a.localeCompare(b)).map(([month,{total,done}])=>({month,rate:total?Math.round(done/total*100):0}));
}
function exportCSV(){
  const dates=Object.keys(records).sort();
  if(!dates.length){alert("기록이 없습니다.");return;}
  const header=["날짜",...habits,"완료율(%)"].join(",");
  const rows=dates.map(date=>{const c=records[date]||{};const vals=habits.map(h=>c[h]?1:0);const rate=Math.round(vals.reduce((a,b)=>a+b,0)/habits.length*100);return[date,...vals,rate].join(",");});
  const csv="\uFEFF"+[header,...rows].join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`habit_tracker_${todayKey()}.csv`;a.click();URL.revokeObjectURL(url);
}

// ── Render ───────────────────────────────────────────────────────────────────
function render(){document.getElementById("app").innerHTML=buildApp();bindEvents();}
function buildApp(){
  const today=todayKey(),tc=records[today]||{};
  const doneCount=habits.filter(h=>tc[h]).length;
  const doneRate=habits.length?Math.round(doneCount/habits.length*100):0;
  const dotCls="sync-dot"+(syncStatus==="syncing"?" syncing":syncStatus==="error"?" error":"");
  const stText=syncStatus==="syncing"?"동기화 중...":syncStatus==="error"?"⚠️ 동기화 실패":
    lastSync?`마지막 동기화: ${lastSync.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}`:"대기 중";
  return `
  <div class="header"><div class="header-inner">
    <div class="header-title"><span class="${dotCls}"></span>습관 트래커</div>
    <div class="header-date">${today}</div>
    <div class="sync-status">${stText}</div>
    ${currentTab==="today"?`<div class="progress-card">
      <div class="progress-top"><span class="progress-label">오늘의 달성률</span><span class="progress-pct">${doneRate}%</span></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${doneRate}%"></div></div>
      <div class="progress-sub">${doneCount} / ${habits.length} 완료</div>
    </div>`:""}
  </div></div>
  <div class="tabbar"><div class="tabbar-inner">
    ${[["today","✅ 오늘"],["stats","📊 통계"],["manage","⚙️ 관리"]].map(([k,l])=>`<button class="tab-btn${currentTab===k?" active":""}" data-tab="${k}">${l}</button>`).join("")}
  </div></div>
  <div class="content">
    ${currentTab==="today"?buildToday(today,tc):""}
    ${currentTab==="stats"?buildStats():""}
    ${currentTab==="manage"?buildManage():""}
  </div>`;
}
function buildToday(today,tc){
  const w7=last7();
  return habits.map(h=>{
    const done=!!tc[h],streak=calcStreak(h),saving=savingSet.has(h);
    return `<div class="habit-card${done?" done":""}${saving?" saving":""}" data-habit="${encodeURIComponent(h)}">
      <div class="check-circle">${done?"✓":""}</div>
      <div class="habit-info"><div class="habit-name">${h}</div>${streak>1?`<div class="habit-streak">🔥 ${streak}일 연속</div>`:""}</div>
      <div class="habit-badge">${saving?"저장중…":done?"완료":"미완"}</div>
    </div>`;
  }).join("")+`
  <div class="week-card"><div class="week-label">최근 7일</div><div class="week-grid">
    ${w7.map(d=>{
      const r=records[d]||{},cnt=habits.filter(h=>r[h]).length,pct=habits.length?cnt/habits.length:0;
      const bg=pct===0?"#f1f5f9":pct<0.5?"#fde68a":pct<0.8?"#6ee7b7":"#10b981";
      const tc2=pct>=0.5?"#065f46":"#92400e";
      return `<div class="week-cell"><div class="week-box" style="background:${bg};border:${d===today?"2px solid #6366f1":"none"};color:${tc2}">${pct>0?Math.round(pct*100)+"%":""}</div><div class="week-day">${d.slice(5)}</div></div>`;
    }).join("")}
  </div></div>`;
}
function buildStats(){
  const ms=monthlyStats(),l30=last30();
  const W=560,H=200,pad={top:24,right:16,bottom:40,left:44};
  const cW=W-pad.left-pad.right,cH=H-pad.top-pad.bottom;
  let chart="";
  if(ms.length){
    const barW=Math.min(38,cW/ms.length-6);
    let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;overflow:visible">`;
    [0,25,50,75,100].forEach(v=>{const y=pad.top+cH-(v/100)*cH;svg+=`<line x1="${pad.left}" x2="${W-pad.right}" y1="${y}" y2="${y}" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="${v===0?"none":"4 3"}"/><text x="${pad.left-6}" y="${y+4}" text-anchor="end" fill="#94a3b8" font-size="10">${v}%</text>`;});
    ms.forEach((d,i)=>{const x=pad.left+(i/ms.length)*cW+(cW/ms.length-barW)/2;const bH=(d.rate/100)*cH;const y=pad.top+cH-bH;const color=d.rate>=80?"#10b981":d.rate>=50?"#f59e0b":"#ef4444";svg+=`<rect x="${x}" y="${y}" width="${barW}" height="${bH||2}" rx="4" fill="${color}" opacity="0.85"/><text x="${x+barW/2}" y="${y-6}" text-anchor="middle" fill="${color}" font-size="11" font-weight="600">${d.rate}%</text><text x="${x+barW/2}" y="${H-6}" text-anchor="middle" fill="#64748b" font-size="10">${d.month.slice(5)}</text>`;});
    chart=svg+`</svg>`;
  } else chart=`<div style="color:#888;text-align:center;padding:40px 0;font-size:14px">데이터가 아직 없습니다.</div>`;
  return `
  <div class="stat-card"><div class="stat-title">📈 월간 완료율 추이</div>${chart}</div>
  <div class="stat-card"><div class="stat-title">🏆 습관별 30일 달성률</div>
    ${habits.map(h=>{const done30=l30.filter(d=>records[d]&&records[d][h]).length;const rate30=Math.round(done30/30*100);const color=rate30>=80?"#10b981":rate30>=50?"#f59e0b":"#ef4444";
      return `<div class="bar-row"><div class="bar-row-top"><span class="bar-row-name">${h}</span><span class="bar-row-pct" style="color:${color}">${rate30}%</span></div><div class="bar-bg"><div class="bar-fill" style="width:${rate30}%;background:${color}"></div></div></div>`;
    }).join("")}
  </div>
  <button class="export-btn" id="exportBtn">📥 Excel(CSV) 파일 저장</button>
  <div class="export-hint">Google Sheets에 모든 기기 기록이 자동 저장됩니다</div>`;
}
function buildManage(){
  return `
  <div class="manage-card"><div class="manage-title">➕ 새 습관 추가</div>
    <div class="add-row"><input class="add-input" id="newHabitInput" placeholder="새 습관 이름 입력..." maxlength="40"/><button class="add-btn" id="addHabitBtn">추가</button></div>
  </div>
  <div class="manage-card"><div class="manage-title">📝 습관 목록 (${habits.length}개)</div>
    ${habits.map((h,i)=>`<div class="habit-list-item"><span class="habit-num">${i+1}</span>
      ${editIdx===i
        ?`<input class="edit-input" id="editInput" value="${h.replace(/"/g,'&quot;')}"/><button class="btn-save" data-saveidx="${i}" data-old="${encodeURIComponent(h)}">저장</button>`
        :`<span class="habit-list-name">${h}</span><button class="btn-edit" data-editidx="${i}">수정</button><button class="btn-del" data-del="${encodeURIComponent(h)}">삭제</button>`}
    </div>`).join("")}
  </div>
  <div class="notice">☁️ 모든 데이터는 Google Sheets에 자동 동기화됩니다.</div>`;
}
function bindEvents(){
  document.querySelectorAll(".tab-btn").forEach(btn=>btn.addEventListener("click",()=>{currentTab=btn.dataset.tab;editIdx=-1;render();}));
  document.querySelectorAll(".habit-card").forEach(card=>{
    card.addEventListener("click",async()=>{
      const h=decodeURIComponent(card.dataset.habit),today=todayKey();
      if(!records[today])records[today]={};
      records[today][h]=!records[today][h];
      savingSet.add(h);render();await saveToCloud();savingSet.delete(h);render();
    });
  });
  const expBtn=document.getElementById("exportBtn");if(expBtn)expBtn.addEventListener("click",exportCSV);
  const addBtn=document.getElementById("addHabitBtn"),addInput=document.getElementById("newHabitInput");
  async function addHabit(){const v=addInput?addInput.value.trim():"";if(v&&!habits.includes(v)){habits.push(v);render();await saveToCloud();render();}}
  if(addBtn)addBtn.addEventListener("click",addHabit);
  if(addInput)addInput.addEventListener("keydown",e=>{if(e.key==="Enter")addHabit();});
  document.querySelectorAll(".btn-edit").forEach(btn=>btn.addEventListener("click",()=>{editIdx=parseInt(btn.dataset.editidx);render();setTimeout(()=>{const inp=document.getElementById("editInput");if(inp)inp.focus();},50);}));
  document.querySelectorAll(".btn-save").forEach(btn=>btn.addEventListener("click",async()=>{
    const inp=document.getElementById("editInput"),v=inp?inp.value.trim():"",old=decodeURIComponent(btn.dataset.old);
    if(v&&v!==old)habits=habits.map(x=>x===old?v:x);
    editIdx=-1;render();await saveToCloud();render();
  }));
  document.querySelectorAll(".btn-del").forEach(btn=>btn.addEventListener("click",async()=>{
    const h=decodeURIComponent(btn.dataset.del);
    if(confirm(`"${h}" 항목을 삭제할까요?`)){habits=habits.filter(x=>x!==h);render();await saveToCloud();render();}
  }));
}
bindLock();
checkLock();
</script>
</body>
</html>
