<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="아이디어 노트"/>
<title>아이디어 노트</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Pretendard','Noto Sans KR',sans-serif;background:#fffbf0;min-height:100vh;}
  button{cursor:pointer;font-family:inherit;}
  input,textarea,select{font-family:inherit;}
  textarea{resize:vertical;}

  :root{--a1:#412402;--a2:#633806;--a3:#854F0B;--a4:#BA7517;--a5:#EF9F27;--al:#FAEEDA;--all:#fffbf0;}

  .lock-screen{position:fixed;inset:0;background:linear-gradient(135deg,#412402 0%,#854F0B 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:16px;}
  .lock-icon{font-size:48px;}
  .lock-title{font-size:22px;font-weight:800;color:#FAEEDA;letter-spacing:-0.5px;}
  .lock-sub{font-size:13px;color:rgba(250,238,218,.75);}
  .lock-input{width:200px;padding:12px 16px;border-radius:12px;border:2px solid rgba(250,238,218,.3);background:rgba(250,238,218,.15);color:#FAEEDA;font-size:20px;text-align:center;letter-spacing:4px;outline:none;font-family:inherit;}
  .lock-input::placeholder{color:rgba(250,238,218,.4);letter-spacing:2px;}
  .lock-input:focus{border-color:rgba(250,238,218,.7);}
  .lock-btn{width:200px;padding:13px;background:#FAEEDA;color:#412402;border:none;border-radius:12px;font-size:15px;font-weight:800;}
  .lock-error{font-size:13px;color:#fca5a5;min-height:20px;}

  .header{background:linear-gradient(135deg,#412402 0%,#854F0B 100%);padding:24px 20px 20px;color:#FAEEDA;}
  .header-inner{max-width:520px;margin:0 auto;}
  .header-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#FAC775;display:inline-block;flex-shrink:0;}
  .sync-dot.ok{background:#86efac;}
  .sync-dot.syncing{background:#fbbf24;animation:pulse 1s infinite;}
  .sync-dot.error{background:#f87171;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  .header-date{font-size:13px;opacity:.8;margin-top:2px;}
  .sync-status{font-size:11px;opacity:.7;margin-top:1px;}
  .stats-row{display:flex;gap:8px;margin-top:14px;}
  .stat-box{flex:1;background:rgba(250,238,218,.15);border-radius:12px;padding:10px 8px;text-align:center;}
  .stat-num{font-size:20px;font-weight:800;}
  .stat-lbl{font-size:10px;opacity:.8;margin-top:2px;}

  .tabbar{background:#fff;border-bottom:1px solid #FAEEDA;position:sticky;top:0;z-index:10;}
  .tabbar-inner{max-width:520px;margin:0 auto;display:flex;}
  .tab-btn{flex:1;padding:12px 0;border:none;background:none;font-size:11px;font-weight:600;color:#94a3b8;border-bottom:2px solid transparent;transition:all .2s;}
  .tab-btn.active{color:var(--a3);border-bottom:2px solid var(--a3);}

  .content{max-width:520px;margin:0 auto;padding:16px 16px 100px;}

  .loading-overlay{position:fixed;inset:0;background:rgba(255,251,240,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:16px;}
  .loading-spinner{width:40px;height:40px;border:3px solid #FAEEDA;border-top-color:var(--a3);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:14px;color:var(--a2);font-weight:600;}

  /* Search */
  .search-bar{background:#fff;border:1.5px solid #FAEEDA;border-radius:12px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .search-bar input{border:none;outline:none;flex:1;font-size:13px;color:#1f2937;background:transparent;font-family:inherit;}

  /* Filter pills */
  .filter-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;}
  .filter-pill{padding:5px 12px;border-radius:99px;font-size:11px;font-weight:600;border:none;white-space:nowrap;cursor:pointer;transition:all .15s;}

  /* Idea cards */
  .idea-card{background:#fff;border:1.5px solid #FAEEDA;border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:0 1px 3px #0000000a;}
  .idea-card.starred{border-color:#EF9F27;}
  .idea-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;gap:8px;}
  .idea-badges{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
  .tag-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;}
  .tag-업무{background:#FAEEDA;color:#633806;}
  .tag-사업{background:#EEEDFE;color:#3C3489;}
  .tag-학습{background:#E1F5EE;color:#065f46;}
  .tag-여행{background:#E6F1FB;color:#185FA5;}
  .tag-건강{background:#FCEBEB;color:#791F1F;}
  .tag-기타{background:#F1EFE8;color:#444441;}
  .status-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;}
  .status-아이디어{background:#FAEEDA;color:#854F0B;}
  .status-검토중{background:#fef3c7;color:#92400e;}
  .status-실행중{background:#E1F5EE;color:#065f46;}
  .status-보류{background:#F1EFE8;color:#5F5E5A;}
  .status-완료{background:#EEEDFE;color:#3C3489;}
  .star-btn{background:none;border:none;font-size:18px;flex-shrink:0;padding:0;line-height:1;}
  .idea-title{font-size:14px;font-weight:700;color:#1f2937;margin-bottom:5px;line-height:1.4;}
  .idea-body{font-size:12px;color:#6b7280;line-height:1.65;margin-bottom:8px;}
  .idea-footer{display:flex;align-items:center;justify-content:space-between;}
  .idea-date{font-size:11px;color:#9ca3af;}
  .idea-actions{display:flex;gap:8px;}
  .btn-memo{font-size:11px;color:var(--a4);font-weight:600;background:none;border:none;padding:0;}
  .btn-del-idea{font-size:11px;color:#d1d5db;background:none;border:none;padding:0;}

  /* Memo expand */
  .memo-area{margin-top:10px;padding-top:10px;border-top:1px solid #FAEEDA;}
  .memo-item{font-size:12px;color:#374151;padding:6px 10px;background:#fffbf0;border-radius:8px;margin-bottom:4px;line-height:1.5;}
  .memo-date{font-size:10px;color:#9ca3af;margin-left:6px;}
  .memo-input-row{display:flex;gap:6px;margin-top:6px;}
  .memo-input{flex:1;border:1.5px solid #FAEEDA;border-radius:8px;padding:6px 10px;font-size:12px;outline:none;color:#1f2937;}
  .memo-input:focus{border-color:var(--a4);}
  .memo-add-btn{background:var(--a4);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;}

  /* Status change */
  .status-select{border:1.5px solid #FAEEDA;border-radius:8px;padding:3px 8px;font-size:11px;outline:none;color:var(--a2);background:#fff;font-family:inherit;}

  /* Form */
  .form-card{background:#fff;border-radius:16px;padding:16px;border:1.5px solid #FAEEDA;margin-bottom:12px;}
  .form-section{font-size:13px;font-weight:700;color:var(--a2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #FAEEDA;}
  .form-group{margin-bottom:12px;}
  .form-label{font-size:12px;color:#4b5563;font-weight:600;margin-bottom:5px;display:block;}
  .form-input{width:100%;border:1.5px solid #FAEEDA;border-radius:10px;padding:9px 12px;font-size:14px;outline:none;color:#1f2937;}
  .form-input:focus{border-color:var(--a4);}
  .form-select{width:100%;border:1.5px solid #FAEEDA;border-radius:10px;padding:9px 12px;font-size:14px;outline:none;color:#1f2937;background:#fff;}
  .form-textarea{width:100%;border:1.5px solid #FAEEDA;border-radius:10px;padding:9px 12px;font-size:14px;outline:none;color:#1f2937;min-height:90px;}
  .form-textarea:focus{border-color:var(--a4);}
  .form-row{display:flex;gap:8px;}
  .form-row .form-group{flex:1;}
  .submit-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--a2),var(--a4));color:#FAEEDA;border:none;border-radius:12px;font-size:15px;font-weight:700;margin-top:4px;}
  .export-btn{width:100%;padding:13px;background:linear-gradient(135deg,#412402,#BA7517);color:#FAEEDA;border:none;border-radius:12px;font-size:14px;font-weight:700;margin-top:4px;}
  .notice{background:#FAEEDA;border:1px solid #FAC775;border-radius:12px;padding:12px;font-size:12px;color:#633806;line-height:1.7;margin-top:10px;}
  .empty{text-align:center;padding:40px 0;color:#9ca3af;font-size:14px;}

  /* Tag stats */
  .tag-stat-card{background:#fff;border-radius:14px;padding:14px;border:1.5px solid #FAEEDA;margin-bottom:8px;}
  .tag-stat-title{font-size:13px;font-weight:700;color:var(--a1);margin-bottom:10px;}
  .tag-stat-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .tag-stat-name{font-size:13px;color:#374151;}
  .tag-stat-count{font-size:13px;font-weight:700;color:var(--a4);}
  .tag-bar-bg{flex:1;margin:0 10px;background:#FAEEDA;border-radius:4px;height:5px;}
  .tag-bar-fill{height:100%;border-radius:4px;background:var(--a4);}
</style>
</head>
<body>

<div id="lockScreen" class="lock-screen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">아이디어 노트</div>
  <div class="lock-sub">비밀번호를 입력하세요</div>
  <input class="lock-input" type="password" id="lockInput" placeholder="••••" maxlength="20"/>
  <div class="lock-error" id="lockError"></div>
  <button class="lock-btn" id="lockBtn">확인</button>
</div>

<div id="loadingOverlay" class="loading-overlay" style="display:none;">
  <div class="loading-spinner"></div>
  <div class="loading-text">아이디어 노트 불러오는 중...</div>
</div>

<div id="app"></div>

<script>
const PASSWD = "1229";
const API_URL = "https://script.google.com/macros/s/AKfycbz9M_P1iuofe4oT6Tky5-gafLLvwCtRGutU1zrGalFRyfxPhhtjZgFPJvWKSDih7hXQ8Q/exec";

let ideas = JSON.parse(localStorage.getItem("in_ideas") || "[]");
let currentTab = "all";
let tagFilter = "전체";
let searchQ = "";
let syncStatus = "idle";
let lastSync = null;
let expandedMemos = new Set();
let syncStatus2 = "idle";

// ── Lock ─────────────────────────────────────────────────────────────────────
function checkLock(){
  if(sessionStorage.getItem("in_auth")===PASSWD){
    document.getElementById("lockScreen").style.display="none";
    document.getElementById("loadingOverlay").style.display="flex";
    loadFromCloud();
  }
}
function bindLock(){
  const btn=document.getElementById("lockBtn"),inp=document.getElementById("lockInput"),err=document.getElementById("lockError");
  function tryUnlock(){
    if(inp.value===PASSWD){
      sessionStorage.setItem("in_auth",PASSWD);
      document.getElementById("lockScreen").style.display="none";
      document.getElementById("loadingOverlay").style.display="flex";
      loadFromCloud();
    } else {
      err.textContent="비밀번호가 틀렸습니다.";inp.value="";inp.focus();
      setTimeout(()=>err.textContent="",2000);
    }
  }
  btn.addEventListener("click",tryUnlock);
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")tryUnlock();});
}

// ── API ──────────────────────────────────────────────────────────────────────
async function apiGet(key){const res=await fetch(`${API_URL}?key=${encodeURIComponent(key)}`);return(await res.json()).value;}
async function apiSet(key,value){await fetch(API_URL,{method:"POST",body:JSON.stringify({key,value})});}
async function loadFromCloud(){
  try{
    syncStatus="syncing";
    const ci=await apiGet("in_ideas");
    if(ci){ideas=ci;localStorage.setItem("in_ideas",JSON.stringify(ideas));}
    syncStatus="ok";lastSync=new Date();
  }catch(e){syncStatus="error";}
  document.getElementById("loadingOverlay").style.display="none";
  render();
}
async function saveToCloud(){
  try{
    syncStatus="syncing";updateSyncUI();
    await apiSet("in_ideas",ideas);
    localStorage.setItem("in_ideas",JSON.stringify(ideas));
    syncStatus="ok";lastSync=new Date();
  }catch(e){syncStatus="error";}
  updateSyncUI();
}
function updateSyncUI(){
  const dot=document.querySelector(".sync-dot"),st=document.querySelector(".sync-status");
  if(!dot||!st)return;
  dot.className="sync-dot"+(syncStatus==="syncing"?" syncing":syncStatus==="error"?" error":" ok");
  st.textContent=syncStatus==="syncing"?"동기화 중...":syncStatus==="error"?"⚠️ 동기화 실패":
    lastSync?`마지막 동기화: ${lastSync.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}`:"대기 중";
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function todayKey(){return new Date().toISOString().slice(0,10);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function thisMonthCount(){const m=todayKey().slice(0,7);return ideas.filter(i=>i.date.slice(0,7)===m).length;}
function runningCount(){return ideas.filter(i=>i.status==="실행중").length;}
const TAGS=["전체","💼 업무","🚀 사업","📚 학습","🌍 여행","💪 건강","📌 기타"];
const TAG_KEYS=["전체","업무","사업","학습","여행","건강","기타"];
const STATUSES=["💡 아이디어","🔍 검토중","✅ 실행중","⏸ 보류","🎉 완료"];
const STATUS_KEYS=["아이디어","검토중","실행중","보류","완료"];

function tagKey(t){return t.replace(/[^\w가-힣]/g,"").trim();}
function statusKey(s){return s.replace(/[^\w가-힣]/g,"").trim();}

function exportCSV(){
  if(!ideas.length){alert("기록이 없습니다.");return;}
  const header=["날짜","제목","태그","상태","즐겨찾기","내용","메모수"].join(",");
  const rows=ideas.map(i=>[i.date,`"${i.title}"`,i.tag,i.status,i.starred?"⭐":"",`"${(i.body||"").replace(/"/g,'""')}"`,i.memos?.length||0].join(","));
  const csv="\uFEFF"+[header,...rows].join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`idea_note_${todayKey()}.csv`;a.click();URL.revokeObjectURL(url);
}

// ── Render ───────────────────────────────────────────────────────────────────
function render(){document.getElementById("app").innerHTML=buildApp();bindEvents();}
function buildApp(){
  const dotCls="sync-dot"+(syncStatus==="syncing"?" syncing":syncStatus==="error"?" error":" ok");
  const stText=syncStatus==="syncing"?"동기화 중...":syncStatus==="error"?"⚠️ 동기화 실패":
    lastSync?`마지막 동기화: ${lastSync.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}`:"대기 중";
  return `
  <div class="header"><div class="header-inner">
    <div class="header-title"><span class="${dotCls}"></span>💡 아이디어 노트</div>
    <div class="header-date">${todayKey()}</div>
    <div class="sync-status">${stText}</div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num">${ideas.length}</div><div class="stat-lbl">전체 아이디어</div></div>
      <div class="stat-box"><div class="stat-num">${thisMonthCount()}</div><div class="stat-lbl">이번달 추가</div></div>
      <div class="stat-box"><div class="stat-num">${runningCount()}</div><div class="stat-lbl">실행 중</div></div>
      <div class="stat-box"><div class="stat-num">${ideas.filter(i=>i.starred).length}</div><div class="stat-lbl">즐겨찾기</div></div>
    </div>
  </div></div>
  <div class="tabbar"><div class="tabbar-inner">
    ${[["all","💡 전체"],["tags","🏷️ 태그"],["starred","⭐ 즐겨찾기"],["add","➕ 추가"]].map(([k,l])=>
      `<button class="tab-btn${currentTab===k?" active":""}" data-tab="${k}">${l}</button>`
    ).join("")}
  </div></div>
  <div class="content">
    ${currentTab==="all"?buildAll():""}
    ${currentTab==="tags"?buildTags():""}
    ${currentTab==="starred"?buildStarred():""}
    ${currentTab==="add"?buildAdd():""}
  </div>`;
}

// ── ALL TAB ──────────────────────────────────────────────────────────────────
function buildAll(){
  const tagColors={"전체":"#BA7517","업무":"#633806","사업":"#3C3489","학습":"#065f46","여행":"#185FA5","건강":"#791F1F","기타":"#444441"};
  const tagBgs={"전체":"#BA7517","업무":"#FAEEDA","사업":"#EEEDFE","학습":"#E1F5EE","여행":"#E6F1FB","건강":"#FCEBEB","기타":"#F1EFE8"};

  let filtered=ideas.filter(i=>{
    const tMatch=tagFilter==="전체"||i.tag===tagFilter.replace(/[^\w가-힣]/g,"").trim();
    const qMatch=!searchQ||i.title.includes(searchQ)||i.body?.includes(searchQ);
    return tMatch&&qMatch;
  }).sort((a,b)=>b.date.localeCompare(a.date));

  return `
  <div class="search-bar">
    <span style="font-size:14px;">🔍</span>
    <input id="searchInput" placeholder="제목, 내용 검색..." value="${searchQ}"/>
  </div>
  <div class="filter-row">
    ${TAGS.map((t,i)=>{
      const key=TAG_KEYS[i];
      const isActive=tagFilter===key||tagFilter===t;
      const bg=isActive?(key==="전체"?"#BA7517":tagBgs[key]):"#fffbf0";
      const color=isActive?(key==="전체"?"#FAEEDA":tagColors[key]):"#9ca3af";
      const border=isActive?"none":"1.5px solid #FAEEDA";
      return `<button class="filter-pill" data-tag="${key}" style="background:${bg};color:${color};border:${border};">${t}</button>`;
    }).join("")}
  </div>
  ${filtered.length===0?`<div class="empty">아이디어가 없습니다.<br>➕ 추가 탭에서 첫 아이디어를 기록해보세요!</div>`:""}
  ${filtered.map(idea=>buildIdeaCard(idea)).join("")}`;
}

function buildIdeaCard(idea){
  const expanded=expandedMemos.has(idea.id);
  const memoCount=idea.memos?.length||0;
  return `<div class="idea-card${idea.starred?" starred":""}" id="card_${idea.id}">
    <div class="idea-card-top">
      <div class="idea-badges">
        <span class="tag-badge tag-${idea.tag||"기타"}">${getTagEmoji(idea.tag)}${idea.tag||"기타"}</span>
        <span class="status-badge status-${idea.status||"아이디어"}">${getStatusEmoji(idea.status)}${idea.status||"아이디어"}</span>
      </div>
      <button class="star-btn" data-staridea="${idea.id}">${idea.starred?"⭐":"☆"}</button>
    </div>
    <div class="idea-title">${idea.title}</div>
    ${idea.body?`<div class="idea-body">${idea.body}</div>`:""}
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <select class="status-select" data-statusidea="${idea.id}">
        ${STATUS_KEYS.map(s=>`<option value="${s}"${idea.status===s?" selected":""}>${getStatusEmoji(s)}${s}</option>`).join("")}
      </select>
    </div>
    <div class="idea-footer">
      <span class="idea-date">${idea.date}</span>
      <div class="idea-actions">
        <button class="btn-memo" data-memoidea="${idea.id}">${expanded?"메모 닫기":"📝 메모 ${memoCount>0?memoCount+"개":""}"}</button>
        <button class="btn-del-idea" data-delidi="${idea.id}">✕</button>
      </div>
    </div>
    ${expanded?`
    <div class="memo-area">
      ${(idea.memos||[]).map(m=>`<div class="memo-item">→ ${m.text}<span class="memo-date">${m.date}</span></div>`).join("")}
      <div class="memo-input-row">
        <input class="memo-input" id="mi_${idea.id}" placeholder="메모 추가..."/>
        <button class="memo-add-btn" data-addmemo="${idea.id}">추가</button>
      </div>
    </div>`:""}
  </div>`;
}

function getTagEmoji(tag){const m={"업무":"💼 ","사업":"🚀 ","학습":"📚 ","여행":"🌍 ","건강":"💪 ","기타":"📌 "};return m[tag]||"";}
function getStatusEmoji(s){const m={"아이디어":"💡 ","검토중":"🔍 ","실행중":"✅ ","보류":"⏸ ","완료":"🎉 "};return m[s]||"";}

// ── TAGS TAB ─────────────────────────────────────────────────────────────────
function buildTags(){
  const tagCounts={};
  TAG_KEYS.slice(1).forEach(t=>{tagCounts[t]=ideas.filter(i=>i.tag===t).length;});
  const maxCount=Math.max(...Object.values(tagCounts),1);
  return `
  <div class="tag-stat-card">
    <div class="tag-stat-title">🏷️ 태그별 아이디어 현황</div>
    ${Object.entries(tagCounts).map(([tag,cnt])=>`
    <div class="tag-stat-row">
      <span class="tag-stat-name">${getTagEmoji(tag)}${tag}</span>
      <div class="tag-bar-bg"><div class="tag-bar-fill" style="width:${Math.round(cnt/maxCount*100)}%"></div></div>
      <span class="tag-stat-count">${cnt}</span>
    </div>`).join("")}
  </div>
  <div class="tag-stat-card">
    <div class="tag-stat-title">📊 상태별 현황</div>
    ${STATUS_KEYS.map(s=>{
      const cnt=ideas.filter(i=>i.status===s).length;
      const pct=ideas.length?Math.round(cnt/ideas.length*100):0;
      const colors={"아이디어":"#BA7517","검토중":"#d97706","실행중":"#059669","보류":"#888780","완료":"#534AB7"};
      return `<div class="tag-stat-row">
        <span class="tag-stat-name" style="font-size:12px;">${getStatusEmoji(s)}${s}</span>
        <div class="tag-bar-bg"><div class="tag-bar-fill" style="width:${pct}%;background:${colors[s]||"#BA7517"}"></div></div>
        <span class="tag-stat-count">${cnt}</span>
      </div>`;
    }).join("")}
  </div>
  <button class="export-btn" id="exportBtn">📥 Excel(CSV) 저장</button>
  <div class="notice">☁️ 모든 아이디어는 Google Sheets에 자동 저장됩니다.</div>`;
}

// ── STARRED TAB ──────────────────────────────────────────────────────────────
function buildStarred(){
  const starred=ideas.filter(i=>i.starred).sort((a,b)=>b.date.localeCompare(a.date));
  if(!starred.length)return`<div class="empty">즐겨찾기한 아이디어가 없습니다.<br>카드의 ☆를 눌러 즐겨찾기 추가!</div>`;
  return starred.map(idea=>buildIdeaCard(idea)).join("");
}

// ── ADD TAB ──────────────────────────────────────────────────────────────────
function buildAdd(){
  return `
  <div class="form-card">
    <div class="form-section">💡 새 아이디어 추가</div>
    <div class="form-group">
      <label class="form-label">제목 * <span style="font-size:11px;color:#9ca3af;font-weight:400;">한 줄로 핵심만</span></label>
      <input class="form-input" id="f_title" placeholder="아이디어를 한 줄로 표현하면?"/>
    </div>
    <div class="form-group">
      <label class="form-label">상세 내용</label>
      <textarea class="form-textarea" id="f_body" placeholder="배경, 아이디어 디테일, 관련 정보..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">태그</label>
        <select class="form-select" id="f_tag">
          ${["업무","사업","학습","여행","건강","기타"].map(t=>`<option value="${t}">${getTagEmoji(t)}${t}</option>`).join("")}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">상태</label>
        <select class="form-select" id="f_status">
          ${STATUS_KEYS.map(s=>`<option value="${s}">${getStatusEmoji(s)}${s}</option>`).join("")}
        </select>
      </div>
    </div>
    <div class="form-group" style="display:flex;align-items:center;gap:8px;">
      <input type="checkbox" id="f_star" style="width:16px;height:16px;accent-color:#BA7517;"/>
      <label class="form-label" for="f_star" style="margin:0;">⭐ 즐겨찾기에 추가</label>
    </div>
    <button class="submit-btn" id="addIdeaBtn">💡 아이디어 저장</button>
  </div>
  <div class="notice">💡 투두(할 일)가 아닌 <strong>언젠가 발전시킬 생각</strong>을 저장하는 곳입니다.<br>구체적인 액션은 Google/MS Tasks에 등록하세요.</div>`;
}

// ── Events ───────────────────────────────────────────────────────────────────
function bindEvents(){
  document.querySelectorAll(".tab-btn").forEach(btn=>btn.addEventListener("click",()=>{
    currentTab=btn.dataset.tab;
    if(currentTab!=="all"){searchQ="";tagFilter="전체";}
    render();
  }));

  // Search
  const si=document.getElementById("searchInput");
  if(si)si.addEventListener("input",()=>{searchQ=si.value;render();});

  // Tag filter
  document.querySelectorAll(".filter-pill").forEach(pill=>pill.addEventListener("click",()=>{
    tagFilter=pill.dataset.tag;render();
  }));

  // Star toggle
  document.querySelectorAll("[data-staridea]").forEach(btn=>btn.addEventListener("click",async()=>{
    const idea=ideas.find(i=>i.id===btn.dataset.staridea);
    if(idea){idea.starred=!idea.starred;render();await saveToCloud();render();}
  }));

  // Status change
  document.querySelectorAll("[data-statusidea]").forEach(sel=>sel.addEventListener("change",async()=>{
    const idea=ideas.find(i=>i.id===sel.dataset.statusidea);
    if(idea){idea.status=sel.value;render();await saveToCloud();render();}
  }));

  // Memo expand
  document.querySelectorAll("[data-memoidea]").forEach(btn=>btn.addEventListener("click",()=>{
    const id=btn.dataset.memoidea;
    if(expandedMemos.has(id))expandedMemos.delete(id);else expandedMemos.add(id);
    render();
  }));

  // Add memo
  document.querySelectorAll("[data-addmemo]").forEach(btn=>btn.addEventListener("click",async()=>{
    const id=btn.dataset.addmemo;
    const inp=document.getElementById(`mi_${id}`);
    const text=inp?.value.trim();
    if(!text)return;
    const idea=ideas.find(i=>i.id===id);
    if(!idea)return;
    if(!idea.memos)idea.memos=[];
    idea.memos.push({text,date:todayKey()});
    render();await saveToCloud();render();
    expandedMemos.add(id);
    render();
  }));

  // Delete idea
  document.querySelectorAll("[data-delidi]").forEach(btn=>btn.addEventListener("click",async()=>{
    if(confirm("이 아이디어를 삭제할까요?")){
      ideas=ideas.filter(i=>i.id!==btn.dataset.delidi);
      render();await saveToCloud();render();
    }
  }));

  // Add idea
  const addBtn=document.getElementById("addIdeaBtn");
  if(addBtn)addBtn.addEventListener("click",async()=>{
    const title=(document.getElementById("f_title")?.value||"").trim();
    if(!title){alert("제목을 입력해주세요.");return;}
    const body=(document.getElementById("f_body")?.value||"").trim();
    const tag=document.getElementById("f_tag")?.value||"기타";
    const status=document.getElementById("f_status")?.value||"아이디어";
    const starred=document.getElementById("f_star")?.checked||false;
    ideas.push({id:uid(),title,body,tag,status,starred,date:todayKey(),memos:[]});
    currentTab="all";
    render();await saveToCloud();render();
  });

  // Export
  const expBtn=document.getElementById("exportBtn");
  if(expBtn)expBtn.addEventListener("click",exportCSV);
}

bindLock();
checkLock();
</script>
</body>
</html>
