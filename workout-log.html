<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="운동 기록"/>
<title>운동 기록</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Pretendard','Noto Sans KR',sans-serif;background:#fff5f5;min-height:100vh;}
  button{cursor:pointer;font-family:inherit;}
  input,textarea,select{font-family:inherit;}

  :root{
    --r1:#7f1d1d;--r2:#991b1b;--r3:#b91c1c;
    --r4:#dc2626;--r5:#ef4444;--r6:#f87171;
    --rl:#fee2e2;--rll:#fff5f5;
  }

  /* Lock */
  .lock-screen{position:fixed;inset:0;background:linear-gradient(135deg,#7f1d1d 0%,#b91c1c 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:16px;}
  .lock-icon{font-size:48px;}
  .lock-title{font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.5px;}
  .lock-sub{font-size:13px;color:rgba(255,255,255,.75);}
  .lock-input{width:200px;padding:12px 16px;border-radius:12px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;font-size:20px;text-align:center;letter-spacing:4px;outline:none;font-family:inherit;}
  .lock-input::placeholder{color:rgba(255,255,255,.4);letter-spacing:2px;}
  .lock-input:focus{border-color:rgba(255,255,255,.7);}
  .lock-btn{width:200px;padding:13px;background:#fff;color:#b91c1c;border:none;border-radius:12px;font-size:15px;font-weight:800;}
  .lock-error{font-size:13px;color:#fca5a5;min-height:20px;}

  .header{background:linear-gradient(135deg,#7f1d1d 0%,#b91c1c 100%);padding:24px 20px 20px;color:#fff;}
  .header-inner{max-width:520px;margin:0 auto;}
  .header-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#fca5a5;display:inline-block;flex-shrink:0;}
  .sync-dot.ok{background:#86efac;}
  .sync-dot.syncing{background:#fbbf24;animation:pulse 1s infinite;}
  .sync-dot.error{background:#f87171;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  .header-date{font-size:13px;opacity:.8;margin-top:2px;}
  .sync-status{font-size:11px;opacity:.7;margin-top:1px;}
  .stats-row{display:flex;gap:8px;margin-top:14px;}
  .stat-box{flex:1;background:rgba(255,255,255,.15);border-radius:12px;padding:10px 8px;text-align:center;}
  .stat-num{font-size:18px;font-weight:800;}
  .stat-lbl{font-size:10px;opacity:.8;margin-top:2px;}

  .tabbar{background:#fff;border-bottom:1px solid #fee2e2;position:sticky;top:0;z-index:10;}
  .tabbar-inner{max-width:520px;margin:0 auto;display:flex;}
  .tab-btn{flex:1;padding:12px 0;border:none;background:none;font-size:12px;font-weight:600;color:#94a3b8;border-bottom:2px solid transparent;transition:all .2s;}
  .tab-btn.active{color:var(--r3);border-bottom:2px solid var(--r3);}

  .content{max-width:520px;margin:0 auto;padding:16px 16px 100px;}

  .loading-overlay{position:fixed;inset:0;background:rgba(255,245,245,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:16px;}
  .loading-spinner{width:40px;height:40px;border:3px solid #fee2e2;border-top-color:var(--r3);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:14px;color:var(--r2);font-weight:600;}

  /* Log cards */
  .log-card{background:#fff;border:1.5px solid #fee2e2;border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:0 1px 3px #0000000a;}
  .log-date{font-size:12px;font-weight:700;color:var(--r2);margin-bottom:8px;}
  .log-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
  .badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;}
  .badge.gym{background:#fee2e2;color:#991b1b;}
  .badge.run{background:#fef3c7;color:#92400e;}
  .badge.home{background:#e0e7ff;color:#3730a3;}
  .log-detail{font-size:12px;color:#6b7280;line-height:1.8;}
  .log-detail strong{color:#374151;font-weight:600;}
  .pr-highlight{color:#b91c1c;font-weight:700;}

  /* Stats */
  .stat-card{background:#fff;border-radius:16px;padding:20px;border:1.5px solid #fee2e2;margin-bottom:12px;}
  .stat-title{font-size:14px;font-weight:700;color:var(--r1);margin-bottom:14px;}
  .pr-card{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #fff5f5;}
  .pr-card:last-child{border-bottom:none;}
  .pr-name{font-size:13px;color:#374151;font-weight:600;}
  .pr-val{font-size:18px;font-weight:800;color:var(--r3);}
  .pr-date{font-size:10px;color:#9ca3af;margin-top:1px;text-align:right;}
  .bar-row{margin-bottom:10px;}
  .bar-row-top{display:flex;justify-content:space-between;margin-bottom:4px;gap:8px;}
  .bar-row-name{font-size:12px;color:#4b5563;flex:1;}
  .bar-row-val{font-size:12px;font-weight:700;flex-shrink:0;}
  .bar-bg{background:#fff5f5;border-radius:6px;height:6px;}
  .bar-fill{height:100%;border-radius:6px;transition:width .4s;}

  /* Heatmap */
  .heatmap-grid{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
  .hm-cell{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}

  /* Form */
  .form-card{background:#fff;border-radius:16px;padding:16px;border:1.5px solid #fee2e2;margin-bottom:12px;}
  .form-section{font-size:13px;font-weight:700;color:var(--r2);margin:0 0 12px;padding-bottom:8px;border-bottom:1px solid #fee2e2;}
  .form-group{margin-bottom:12px;}
  .form-label{font-size:12px;color:#4b5563;font-weight:600;margin-bottom:5px;display:block;}
  .form-input{width:100%;border:1.5px solid #fee2e2;border-radius:10px;padding:9px 12px;font-size:14px;outline:none;color:#1f2937;}
  .form-input:focus{border-color:var(--r4);}
  .form-row{display:flex;gap:8px;}
  .form-row .form-group{flex:1;}
  .form-row-3{display:flex;gap:8px;}
  .form-row-3 .form-group{flex:1;}

  /* Category toggles */
  .cat-toggle-row{display:flex;gap:8px;margin-bottom:16px;}
  .cat-toggle{flex:1;padding:10px 0;border:2px solid #fee2e2;background:#fff;border-radius:12px;font-size:13px;font-weight:700;color:#9ca3af;text-align:center;transition:all .2s;}
  .cat-toggle.active-gym{border-color:var(--r3);background:#fee2e2;color:var(--r2);}
  .cat-toggle.active-run{border-color:#d97706;background:#fef3c7;color:#92400e;}
  .cat-toggle.active-home{border-color:#6366f1;background:#e0e7ff;color:#3730a3;}

  /* Exercise block */
  .ex-block{background:#fff5f5;border-radius:12px;padding:12px;margin-bottom:8px;}
  .ex-block-title{font-size:12px;font-weight:700;color:var(--r2);margin-bottom:8px;}
  .ex-optional{font-size:11px;color:#9ca3af;margin-left:6px;font-weight:400;}

  .submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--r2),var(--r4));color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;margin-top:8px;}
  .export-btn{width:100%;padding:13px;background:linear-gradient(135deg,#991b1b,#dc2626);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;margin-top:4px;}
  .notice{background:#fff5f5;border:1px solid #fecaca;border-radius:12px;padding:12px;font-size:12px;color:#991b1b;line-height:1.7;margin-top:10px;}
  .empty{text-align:center;padding:40px 0;color:#9ca3af;font-size:14px;}
  .delete-btn{float:right;background:none;border:none;font-size:12px;color:#d1d5db;cursor:pointer;}
</style>
</head>
<body>

<div id="lockScreen" class="lock-screen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">운동 기록</div>
  <div class="lock-sub">비밀번호를 입력하세요</div>
  <input class="lock-input" type="password" id="lockInput" placeholder="••••" maxlength="20"/>
  <div class="lock-error" id="lockError"></div>
  <button class="lock-btn" id="lockBtn">확인</button>
</div>

<div id="loadingOverlay" class="loading-overlay" style="display:none;">
  <div class="loading-spinner"></div>
  <div class="loading-text">운동 기록 불러오는 중...</div>
</div>

<div id="app"></div>

<script>
const PASSWD = "1229";
const API_URL = "https://script.google.com/macros/s/AKfycbz9M_P1iuofe4oT6Tky5-gafLLvwCtRGutU1zrGalFRyfxPhhtjZgFPJvWKSDih7hXQ8Q/exec";

let logs = JSON.parse(localStorage.getItem("wo_logs") || "[]");
let currentTab = "log";
let syncStatus = "idle";
let lastSync = null;
// form state
let selGym = false, selRun = false, selHome = false;

// ── Lock ─────────────────────────────────────────────────────────────────────
function checkLock(){
  if(sessionStorage.getItem("wo_auth")===PASSWD){
    document.getElementById("lockScreen").style.display="none";
    document.getElementById("loadingOverlay").style.display="flex";
    loadFromCloud();
  }
}
function bindLock(){
  const btn=document.getElementById("lockBtn"),inp=document.getElementById("lockInput"),err=document.getElementById("lockError");
  function tryUnlock(){
    if(inp.value===PASSWD){
      sessionStorage.setItem("wo_auth",PASSWD);
      document.getElementById("lockScreen").style.display="none";
      document.getElementById("loadingOverlay").style.display="flex";
      loadFromCloud();
    } else {
      err.textContent="비밀번호가 틀렸습니다.";inp.value="";inp.focus();
      setTimeout(()=>err.textContent="",2000);
    }
  }
  btn.addEventListener("click",tryUnlock);
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")tryUnlock();});
}

// ── API ──────────────────────────────────────────────────────────────────────
async function apiGet(key){const res=await fetch(`${API_URL}?key=${encodeURIComponent(key)}`);return(await res.json()).value;}
async function apiSet(key,value){await fetch(API_URL,{method:"POST",body:JSON.stringify({key,value})});}
async function loadFromCloud(){
  try{
    syncStatus="syncing";
    const cl=await apiGet("wo_logs");
    if(cl){logs=cl;localStorage.setItem("wo_logs",JSON.stringify(logs));}
    syncStatus="ok";lastSync=new Date();
  }catch(e){syncStatus="error";}
  document.getElementById("loadingOverlay").style.display="none";
  render();
}
async function saveToCloud(){
  try{
    syncStatus="syncing";updateSyncUI();
    await apiSet("wo_logs",logs);
    localStorage.setItem("wo_logs",JSON.stringify(logs));
    syncStatus="ok";lastSync=new Date();
  }catch(e){syncStatus="error";}
  updateSyncUI();
}
function updateSyncUI(){
  const dot=document.querySelector(".sync-dot"),st=document.querySelector(".sync-status");
  if(!dot||!st)return;
  dot.className="sync-dot"+(syncStatus==="syncing"?" syncing":syncStatus==="error"?" error":" ok");
  st.textContent=syncStatus==="syncing"?"동기화 중...":syncStatus==="error"?"⚠️ 동기화 실패":
    lastSync?`마지막 동기화: ${lastSync.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}`:"대기 중";
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function todayKey(){
  var d=new Date();
  d.setTime(d.getTime()+(9*60*60*1000));
  return d.toISOString().slice(0,10);
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function getPR(exercise){
  const vals=logs.filter(l=>l[exercise]&&l[exercise].weight>0).map(l=>({w:l[exercise].weight,d:l.date}));
  if(!vals.length)return null;
  return vals.reduce((a,b)=>b.w>a.w?b:a);
}
function getRunningPace(km,min){
  if(!km||!min)return"-";
  const pace=min/km;
  const m=Math.floor(pace),s=Math.round((pace-m)*60);
  return `${m}'${s.toString().padStart(2,"0")}"`;
}
function thisMonthRunKm(){
  const m=todayKey().slice(0,7);
  return logs.filter(l=>l.date.slice(0,7)===m&&l.running?.km).reduce((s,l)=>s+parseFloat(l.running.km||0),0).toFixed(1);
}
function thisMonthWorkouts(){
  const m=todayKey().slice(0,7);
  return logs.filter(l=>l.date.slice(0,7)===m).length;
}
function exportCSV(){
  if(!logs.length){alert("기록이 없습니다.");return;}
  const header=["날짜","헬스","스쿼트kg","레그프레스kg","숄더프레스kg","사이클분","사이드레터럴kg","러닝","거리km","시간분","페이스","홈트","풀업세트x횟수","푸쉬업세트x횟수","케틀벨스윙횟수","케틀벨프레스kgx횟수"].join(",");
  const rows=logs.map(l=>[
    l.date,
    l.gym?"O":"",
    l.squat?.weight||"",l.legpress?.weight||"",l.shoulder?.weight||"",l.cycle?.min||"",l.lateral?.weight||"",
    l.running?"O":"",
    l.running?.km||"",l.running?.min||"",l.running?.pace||"",
    l.home?"O":"",
    l.pullup?`${l.pullup.sets}x${l.pullup.reps}`:"",
    l.pushup?`${l.pushup.sets}x${l.pushup.reps}`:"",
    l.kbswing?.reps||"",
    l.kbpress?`${l.kbpress.weight}x${l.kbpress.reps}`:"",
  ].join(","));
  const csv="\uFEFF"+[header,...rows].join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`workout_${todayKey()}.csv`;a.click();URL.revokeObjectURL(url);
}

// ── Render ───────────────────────────────────────────────────────────────────
function render(){document.getElementById("app").innerHTML=buildApp();bindEvents();}
function buildApp(){
  const dotCls="sync-dot"+(syncStatus==="syncing"?" syncing":syncStatus==="error"?" error":" ok");
  const stText=syncStatus==="syncing"?"동기화 중...":syncStatus==="error"?"⚠️ 동기화 실패":
    lastSync?`마지막 동기화: ${lastSync.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}`:"대기 중";
  const sqPR=getPR("squat"),lpPR=getPR("legpress");
  return `
  <div class="header"><div class="header-inner">
    <div class="header-title"><span class="${dotCls}"></span>🏋️ 운동 기록</div>
    <div class="header-date">${todayKey()}</div>
    <div class="sync-status">${stText}</div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num">${thisMonthWorkouts()}</div><div class="stat-lbl">이번달 운동</div></div>
      <div class="stat-box"><div class="stat-num">${thisMonthRunKm()}</div><div class="stat-lbl">이번달 러닝km</div></div>
      <div class="stat-box"><div class="stat-num">${sqPR?sqPR.w+"kg":"-"}</div><div class="stat-lbl">스쿼트 PR</div></div>
      <div class="stat-box"><div class="stat-num">${lpPR?lpPR.w+"kg":"-"}</div><div class="stat-lbl">레그프레스 PR</div></div>
    </div>
  </div></div>
  <div class="tabbar"><div class="tabbar-inner">
    ${[["log","📋 기록"],["stats","📊 통계"],["add","➕ 입력"]].map(([k,l])=>
      `<button class="tab-btn${currentTab===k?" active":""}" data-tab="${k}">${l}</button>`
    ).join("")}
  </div></div>
  <div class="content">
    ${currentTab==="log"?buildLog():""}
    ${currentTab==="stats"?buildStats():""}
    ${currentTab==="add"?buildAdd():""}
  </div>`;
}

// ── LOG TAB ──────────────────────────────────────────────────────────────────
function buildLog(){
  if(!logs.length)return`<div class="empty">아직 운동 기록이 없습니다.<br>➕ 입력 탭에서 첫 기록을 추가해보세요!</div>`;
  const sorted=[...logs].sort((a,b)=>b.date.localeCompare(a.date));
  return sorted.map(l=>{
    let details="";
    if(l.gym){
      if(l.squat?.weight) details+=`<div>🦵 스쿼트 <strong>${l.squat.weight}kg</strong> × ${l.squat.sets}세트</div>`;
      if(l.legpress?.weight) details+=`<div>🦵 레그프레스 <strong>${l.legpress.weight}kg</strong> × ${l.legpress.sets}세트</div>`;
      if(l.shoulder?.weight) details+=`<div>💪 숄더프레스 <strong>${l.shoulder.weight}kg</strong> × ${l.shoulder.sets}세트</div>`;
      if(l.lateral?.weight) details+=`<div>💪 사이드레터럴 <strong>${l.lateral.weight}kg</strong></div>`;
      if(l.cycle?.min) details+=`<div>🚴 사이클 <strong>${l.cycle.min}분</strong></div>`;
    }
    if(l.running?.km) details+=`<div>🏃 러닝 <strong>${l.running.km}km</strong> · ${l.running.min}분 · 페이스 <span class="pr-highlight">${l.running.pace}</span>/km</div>`;
    if(l.home){
      if(l.pullup?.sets) details+=`<div>🔝 풀업 ${l.pullup.sets}세트×${l.pullup.reps}회</div>`;
      if(l.pushup?.sets) details+=`<div>⬇️ 푸쉬업 ${l.pushup.sets}세트×${l.pushup.reps}회</div>`;
      if(l.kbswing?.reps) details+=`<div>🔔 케틀벨 스윙 32kg × ${l.kbswing.reps}회</div>`;
      if(l.kbpress?.weight) details+=`<div>🔔 케틀벨 프레스 ${l.kbpress.weight}kg×${l.kbpress.reps}회</div>`;
    }
    const badges=[];
    if(l.gym)badges.push(`<span class="badge gym">💪 헬스</span>`);
    if(l.running)badges.push(`<span class="badge run">🏃 러닝</span>`);
    if(l.home)badges.push(`<span class="badge home">🏠 홈트</span>`);
    return `<div class="log-card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="log-date">${l.date}</div>
        <button class="delete-btn" data-dellog="${l.id}">✕</button>
      </div>
      <div class="log-badges">${badges.join("")}</div>
      <div class="log-detail">${details}</div>
    </div>`;
  }).join("");
}

// ── STATS TAB ────────────────────────────────────────────────────────────────
function buildStats(){
  // PR cards
  const exercises=[
    {key:"squat",label:"🦵 스쿼트",unit:"kg"},
    {key:"legpress",label:"🦵 레그프레스",unit:"kg"},
    {key:"shoulder",label:"💪 숄더프레스",unit:"kg"},
    {key:"lateral",label:"💪 사이드레터럴",unit:"kg"},
  ];

  // Running monthly
  const runMap={};
  logs.filter(l=>l.running?.km).forEach(l=>{
    const m=l.date.slice(0,7);
    runMap[m]=(runMap[m]||0)+parseFloat(l.running.km||0);
  });
  const runEntries=Object.entries(runMap).sort(([a],[b])=>a.localeCompare(b)).slice(-6);
  const maxRun=Math.max(...runEntries.map(([,v])=>v),1);

  // Squat PR trend (last 10)
  const sqLogs=logs.filter(l=>l.squat?.weight>0).sort((a,b)=>a.date.localeCompare(b.date)).slice(-10);
  const maxSq=Math.max(...sqLogs.map(l=>l.squat.weight),1);

  // Heatmap last 30 days
  const last30=[];
  for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);last30.push(d.toISOString().slice(0,10));}
  const logMap={};
  logs.forEach(l=>logMap[l.date]=l);

  // Monthly workout count by type
  const m=todayKey().slice(0,7);
  const mLogs=logs.filter(l=>l.date.slice(0,7)===m);
  const gymCnt=mLogs.filter(l=>l.gym).length;
  const runCnt=mLogs.filter(l=>l.running).length;
  const homeCnt=mLogs.filter(l=>l.home).length;
  const totalCnt=mLogs.length||1;

  return `
  <!-- PR Board -->
  <div class="stat-card">
    <div class="stat-title">🏆 개인 최고 기록 (PR)</div>
    ${exercises.map(ex=>{
      const pr=getPR(ex.key);
      return `<div class="pr-card">
        <div><div class="pr-name">${ex.label}</div>${pr?`<div style="font-size:10px;color:#9ca3af;">${pr.d}</div>`:""}</div>
        <div class="pr-val">${pr?pr.w+"kg":"기록없음"}</div>
      </div>`;
    }).join("")}
  </div>

  <!-- Squat PR trend -->
  <div class="stat-card">
    <div class="stat-title">📈 스쿼트 무게 추이</div>

  <!-- This month breakdown -->
  <div class="stat-card">
    <div class="stat-title">📅 이번달 운동 구성</div>
    ${[["💪 헬스",gymCnt,"#b91c1c"],["🏃 러닝",runCnt,"#d97706"],["🏠 홈트",homeCnt,"#6366f1"]].map(([name,cnt,color])=>`
    <div class="bar-row">
      <div class="bar-row-top"><span class="bar-row-name">${name}</span><span class="bar-row-val" style="color:${color}">${cnt}회</span></div>

    </div>`).join("")}

  <!-- 30day heatmap -->
  <div class="stat-card">
    <div class="stat-title">📆 최근 30일 운동 현황</div>
    <div class="heatmap-grid">
      ${last30.map(d=>{
        const l=logMap[d];
        const hasGym=l?.gym,hasRun=l?.running,hasHome=l?.home;
        const count=[hasGym,hasRun,hasHome].filter(Boolean).length;
        const bg=count===0?"#f3f4f6":count===1?"#fecaca":count===2?"#f87171":"#b91c1c";
        const textColor=count>=2?"#fff":"#991b1b";
        const isToday=d===todayKey();
        return `<div class="hm-cell" style="background:${bg};color:${textColor};border:${isToday?"2px solid #7f1d1d":"none"}" title="${d}">
          ${count>0?count:""}
        </div>`;
      }).join("")}
    </div>
    <div style="display:flex;gap:12px;margin-top:10px;font-size:10px;color:#9ca3af;">
      <span>🟥 운동 1종</span><span style="color:#f87171">🟧 2종</span><span style="color:#b91c1c">🟫 3종</span>
    </div>
  </div>

  <button class="export-btn" id="exportBtn">📥 Excel(CSV) 저장</button>
  <div class="notice">☁️ 모든 기록은 Google Sheets에 자동 동기화됩니다.</div>`;
}

function buildBarChart(entries,maxV,color,unit){
  const W=520,H=140,pad={top:20,right:16,bottom:28,left:36};
  const cW=W-pad.left-pad.right,cH=H-pad.top-pad.bottom,barW=Math.min(50,cW/entries.length-8);
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;overflow:visible">`;
  entries.forEach(([m,v],i)=>{
    const x=pad.left+(i/entries.length)*cW+(cW/entries.length-barW)/2,bH=(v/maxV)*cH,y=pad.top+cH-bH;
    svg+=`<rect x="${x}" y="${y}" width="${barW}" height="${bH||2}" rx="4" fill="${color}" opacity="0.8"/>`;
    svg+=`<text x="${x+barW/2}" y="${y-4}" text-anchor="middle" fill="${color}" font-size="10" font-weight="600">${Math.round(v*10)/10}</text>`;
    svg+=`<text x="${x+barW/2}" y="${H-2}" text-anchor="middle" fill="#9ca3af" font-size="10">${m.slice(5)}</text>`;
  });
  return svg+`</svg>`;
}

function buildLineChart(data,maxV,color,unit){
  const W=520,H=140,pad={top:20,right:16,bottom:28,left:40};
  const cW=W-pad.left-pad.right,cH=H-pad.top-pad.bottom;
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;overflow:visible">`;
  [0,50,100].forEach(pct=>{const y=pad.top+cH*(1-pct/100);svg+=`<line x1="${pad.left}" x2="${W-pad.right}" y1="${y}" y2="${y}" stroke="#fee2e2" stroke-width="1" stroke-dasharray="${pct===0?"none":"4 3"}"/>`;svg+=`<text x="${pad.left-4}" y="${y+4}" text-anchor="end" fill="#9ca3af" font-size="10">${Math.round(maxV*pct/100)}</text>`;});
  const pts=data.map((d,i)=>{const x=pad.left+(i/(data.length-1))*cW,y=pad.top+cH-(d.val/maxV)*cH;return{x,y,val:d.val,date:d.date};});
  const path=pts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(" ");
  svg+=`<path d="${path}" stroke="${color}" stroke-width="2" fill="none" stroke-linejoin="round"/>`;
  pts.forEach(p=>{
    svg+=`<circle cx="${p.x}" cy="${p.y}" r="4" fill="${color}"/>`;
    svg+=`<text x="${p.x}" y="${p.y-8}" text-anchor="middle" fill="${color}" font-size="10" font-weight="600">${p.val}kg</text>`;
  });
  pts.forEach((p,i)=>{if(i%2===0||data.length<=5)svg+=`<text x="${p.x}" y="${H-2}" text-anchor="middle" fill="#9ca3af" font-size="9">${p.date.slice(5)}</text>`;});
  return svg+`</svg>`;
}

// ── Events ───────────────────────────────────────────────────────────────────
function bindEvents(){
  document.querySelectorAll(".tab-btn").forEach(btn=>btn.addEventListener("click",()=>{
    currentTab=btn.dataset.tab;
    if(currentTab==="add"){selGym=false;selRun=false;selHome=false;}
    render();
  }));

  // Category toggles
  document.querySelectorAll("[data-cat]").forEach(btn=>btn.addEventListener("click",()=>{
    const c=btn.dataset.cat;
    if(c==="gym")selGym=!selGym;
    if(c==="run")selRun=!selRun;
    if(c==="home")selHome=!selHome;
    render();
    // Re-focus
    setTimeout(()=>{
      const addTab=document.querySelector('[data-tab="add"]');
    },10);
  }));

  // Pace preview
  const runKm=document.getElementById("run_km"),runMin=document.getElementById("run_min");
  function updatePace(){
    const preview=document.getElementById("pacePreview");
    if(!preview)return;
    const km=parseFloat(runKm?.value||0),min=parseFloat(runMin?.value||0);
    preview.textContent=km&&min?`페이스: ${getRunningPace(km,min)} /km`:"";
  }
  if(runKm)runKm.addEventListener("input",updatePace);
  if(runMin)runMin.addEventListener("input",updatePace);

  // Save
  const saveBtn=document.getElementById("saveBtn");
  if(saveBtn)saveBtn.addEventListener("click",async()=>{
    const date=document.getElementById("f_date")?.value||todayKey();
    if(!selGym&&!selRun&&!selHome){alert("운동 종류를 선택해주세요.");return;}
    const entry={id:uid(),date,gym:selGym,running:null,home:selHome||false};

    if(selGym){
      const sqW=parseFloat(document.getElementById("sq_w")?.value||0);
      const sqS=parseInt(document.getElementById("sq_s")?.value||0);
      const lpW=parseFloat(document.getElementById("lp_w")?.value||0);
      const lpS=parseInt(document.getElementById("lp_s")?.value||0);
      const shW=parseFloat(document.getElementById("sh_w")?.value||0);
      const shS=parseInt(document.getElementById("sh_s")?.value||0);
      const latW=parseFloat(document.getElementById("lat_w")?.value||0);
      const cyM=parseInt(document.getElementById("cy_m")?.value||0);
      if(sqW)entry.squat={weight:sqW,sets:sqS};
      if(lpW)entry.legpress={weight:lpW,sets:lpS};
      if(shW)entry.shoulder={weight:shW,sets:shS};
      if(latW)entry.lateral={weight:latW};
      if(cyM)entry.cycle={min:cyM};
    }
    if(selRun){
      const km=parseFloat(document.getElementById("run_km")?.value||0);
      const min=parseFloat(document.getElementById("run_min")?.value||0);
      if(!km||!min){alert("러닝 거리와 시간을 입력해주세요.");return;}
      entry.running={km,min,pace:getRunningPace(km,min)};
    }
    if(selHome){
      const puS=parseInt(document.getElementById("pu_s")?.value||0);
      const puR=parseInt(document.getElementById("pu_r")?.value||0);
      const ppS=parseInt(document.getElementById("pp_s")?.value||0);
      const ppR=parseInt(document.getElementById("pp_r")?.value||0);
      if(puS&&puR)entry.pullup={sets:puS,reps:puR};
      if(ppS&&ppR)entry.pushup={sets:ppS,reps:ppR};
      if(!selGym){
        const ksR=parseInt(document.getElementById("ks_r")?.value||0);
        const kpW=parseFloat(document.getElementById("kp_w")?.value||0);
        const kpR=parseInt(document.getElementById("kp_r")?.value||0);
        if(ksR)entry.kbswing={reps:ksR};
        if(kpW&&kpR)entry.kbpress={weight:kpW,reps:kpR};
      }
    }
    logs.push(entry);
    selGym=false;selRun=false;selHome=false;
    currentTab="log";
    render();await saveToCloud();render();
  });

  // Delete log
  document.querySelectorAll("[data-dellog]").forEach(btn=>btn.addEventListener("click",async()=>{
    if(confirm("이 기록을 삭제할까요?")){
      logs=logs.filter(l=>l.id!==btn.dataset.dellog);
      render();await saveToCloud();render();
    }
  }));

  const expBtn=document.getElementById("exportBtn");
  if(expBtn)expBtn.addEventListener("click",exportCSV);
}

bindLock();
checkLock();
</script>
