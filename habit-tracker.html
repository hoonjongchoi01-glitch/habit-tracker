<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="습관 트래커"/>
<title>습관 트래커</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Pretendard','Noto Sans KR',sans-serif;background:#f8fafc;min-height:100vh;}
  button{cursor:pointer;font-family:inherit;}
  input{font-family:inherit;}

  /* Header */
  .header{background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);padding:24px 20px 20px;color:#fff;}
  .header-inner{max-width:520px;margin:0 auto;}
  .header-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
  .header-date{font-size:13px;opacity:.85;margin-top:2px;}
  .progress-card{margin-top:16px;background:rgba(255,255,255,.15);border-radius:16px;padding:14px 18px;}
  .progress-top{display:flex;justify-content:space-between;align-items:center;}
  .progress-label{font-size:14px;font-weight:600;}
  .progress-pct{font-size:26px;font-weight:800;}
  .progress-bar-bg{margin-top:10px;background:rgba(255,255,255,.3);border-radius:8px;height:8px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:#fff;border-radius:8px;transition:width .4s cubic-bezier(.4,0,.2,1);}
  .progress-sub{font-size:12px;opacity:.85;margin-top:6px;}

  /* Tabs */
  .tabbar{background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:10;}
  .tabbar-inner{max-width:520px;margin:0 auto;display:flex;}
  .tab-btn{flex:1;padding:14px 0;border:none;background:none;font-size:13px;font-weight:600;color:#94a3b8;border-bottom:2px solid transparent;transition:all .2s;}
  .tab-btn.active{color:#6366f1;border-bottom:2px solid #6366f1;}

  /* Content */
  .content{max-width:520px;margin:0 auto;padding:16px 16px 100px;}

  /* Habit card */
  .habit-card{display:flex;align-items:center;gap:14px;background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .18s;box-shadow:0 1px 3px #0000000a;}
  .habit-card.done{background:#e0e7ff;border-color:#6366f1;box-shadow:0 2px 8px #6366f122;}
  .check-circle{width:26px;height:26px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .18s;font-size:14px;color:#fff;}
  .habit-card.done .check-circle{background:#6366f1;}
  .habit-name{font-size:15px;font-weight:600;color:#1e293b;}
  .habit-card.done .habit-name{color:#6366f1;}
  .habit-streak{font-size:11px;color:#f59e0b;margin-top:2px;font-weight:600;}
  .habit-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;background:#f1f5f9;color:#cbd5e1;}
  .habit-card.done .habit-badge{background:#6366f118;color:#6366f1;}

  /* Weekly mini */
  .week-card{background:#fff;border-radius:16px;padding:16px;margin-top:8px;border:1px solid #e2e8f0;}
  .week-label{font-size:13px;font-weight:700;color:#475569;margin-bottom:10px;}
  .week-grid{display:flex;gap:6px;justify-content:space-between;}
  .week-cell{flex:1;text-align:center;}
  .week-box{height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
  .week-day{font-size:10px;color:#94a3b8;margin-top:4px;}

  /* Stats */
  .stat-card{background:#fff;border-radius:16px;padding:20px;border:1px solid #e2e8f0;margin-bottom:12px;}
  .stat-title{font-size:14px;font-weight:700;color:#334155;margin-bottom:16px;}
  .bar-row{margin-bottom:10px;}
  .bar-row-top{display:flex;justify-content:space-between;margin-bottom:4px;}
  .bar-row-name{font-size:13px;color:#475569;}
  .bar-row-pct{font-size:13px;font-weight:700;}
  .bar-bg{background:#f1f5f9;border-radius:6px;height:6px;}
  .bar-fill{height:100%;border-radius:6px;transition:width .4s;}

  /* Export btn */
  .export-btn{width:100%;margin-top:16px;padding:14px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;letter-spacing:-.3px;}
  .export-hint{font-size:11px;color:#94a3b8;text-align:center;margin-top:6px;}

  /* Manage */
  .manage-card{background:#fff;border-radius:16px;padding:16px;border:1px solid #e2e8f0;margin-bottom:12px;}
  .manage-title{font-size:14px;font-weight:700;color:#334155;margin-bottom:12px;}
  .add-row{display:flex;gap:8px;}
  .add-input{flex:1;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;}
  .add-input:focus{border-color:#6366f1;}
  .add-btn{background:#6366f1;color:#fff;border:none;border-radius:10px;padding:0 18px;font-weight:700;font-size:14px;}
  .habit-list-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9;}
  .habit-list-item:last-child{border-bottom:none;}
  .habit-num{font-size:14px;color:#64748b;min-width:20px;font-weight:600;}
  .habit-list-name{flex:1;font-size:14px;color:#334155;}
  .edit-input{flex:1;border:1.5px solid #6366f1;border-radius:8px;padding:6px 10px;font-size:14px;outline:none;}
  .btn-edit{background:#f1f5f9;border:none;border-radius:8px;padding:6px 12px;font-size:12px;color:#64748b;}
  .btn-del{background:#fee2e2;border:none;border-radius:8px;padding:6px 12px;font-size:12px;color:#ef4444;}
  .btn-save{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:13px;}
  .notice{background:#fffbeb;border:1px solid #fde68a;border-radius:14px;padding:14px;font-size:12px;color:#92400e;line-height:1.6;}

  /* Chart SVG */
  svg text{font-family:'Pretendard','Noto Sans KR',sans-serif;}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const DEFAULT_HABITS = [
  "기상 시간 지키기","물 2L 마시기","운동 30분","명상 10분",
  "독서 20분","영어 공부","일기 쓰기","스트레칭",
  "비타민 복용","SNS 30분 이하","수면 11시 전","아침 식사",
  "칼로리 기록","걷기 7000보","감사 일기","냉수 샤워"
];

let habits = JSON.parse(localStorage.getItem("ht_habits") || "null") || DEFAULT_HABITS;
let records = JSON.parse(localStorage.getItem("ht_records") || "{}");
let currentTab = "today";
let editIdx = -1;

function save(){
  localStorage.setItem("ht_habits", JSON.stringify(habits));
  localStorage.setItem("ht_records", JSON.stringify(records));
}

// ── Helpers ────────────────────────────────────────────────────────────────
function todayKey(){
  return new Date().toISOString().slice(0,10);
}
function last7(){
  const a=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);a.push(d.toISOString().slice(0,10));}
  return a;
}
function last30(){
  const a=[];
  for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);a.push(d.toISOString().slice(0,10));}
  return a;
}
function calcStreak(habit){
  let s=0;const d=new Date();
  while(true){
    const k=d.toISOString().slice(0,10);
    if(records[k]&&records[k][habit]){s++;d.setDate(d.getDate()-1);}else break;
  }
  return s;
}
function monthlyStats(){
  const map={};
  Object.entries(records).forEach(([date,checks])=>{
    const m=date.slice(0,7);
    if(!map[m])map[m]={total:0,done:0};
    map[m].total+=habits.length;
    map[m].done+=Object.values(checks).filter(Boolean).length;
  });
  return Object.entries(map).sort(([a],[b])=>a.localeCompare(b))
    .map(([month,{total,done}])=>({month,rate:total?Math.round(done/total*100):0}));
}
function exportCSV(){
  const dates=Object.keys(records).sort();
  if(!dates.length){alert("기록이 없습니다.");return;}
  const header=["날짜",...habits,"완료율(%)"].join(",");
  const rows=dates.map(date=>{
    const c=records[date]||{};
    const vals=habits.map(h=>c[h]?1:0);
    const rate=Math.round(vals.reduce((a,b)=>a+b,0)/habits.length*100);
    return [date,...vals,rate].join(",");
  });
  const csv="\uFEFF"+[header,...rows].join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`habit_tracker_${todayKey()}.csv`;a.click();
  URL.revokeObjectURL(url);
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(){
  document.getElementById("app").innerHTML = buildApp();
  bindEvents();
}

function buildApp(){
  const today=todayKey();
  const todayChecks=records[today]||{};
  const doneCount=habits.filter(h=>todayChecks[h]).length;
  const doneRate=habits.length?Math.round(doneCount/habits.length*100):0;

  return `
  <div class="header">
    <div class="header-inner">
      <div class="header-title">✦ 습관 트래커</div>
      <div class="header-date">${today}</div>
      ${currentTab==="today"?`
      <div class="progress-card">
        <div class="progress-top">
          <span class="progress-label">오늘의 달성률</span>
          <span class="progress-pct">${doneRate}%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width:${doneRate}%"></div>
        </div>
        <div class="progress-sub">${doneCount} / ${habits.length} 완료</div>
      </div>`:""}
    </div>
  </div>

  <div class="tabbar">
    <div class="tabbar-inner">
      ${[["today","✅ 오늘"],["stats","📊 통계"],["manage","⚙️ 관리"]].map(([k,l])=>
        `<button class="tab-btn${currentTab===k?" active":""}" data-tab="${k}">${l}</button>`
      ).join("")}
    </div>
  </div>

  <div class="content">
    ${currentTab==="today"?buildToday(today,todayChecks):""}
    ${currentTab==="stats"?buildStats():""}
    ${currentTab==="manage"?buildManage():""}
  </div>`;
}

function buildToday(today, todayChecks){
  const w7=last7();
  return `
  ${habits.map(h=>{
    const done=!!todayChecks[h];
    const streak=calcStreak(h);
    return `
    <div class="habit-card${done?" done":""}" data-habit="${encodeURIComponent(h)}">
      <div class="check-circle">${done?"✓":""}</div>
      <div style="flex:1">
        <div class="habit-name">${h}</div>
        ${streak>1?`<div class="habit-streak">🔥 ${streak}일 연속</div>`:""}
      </div>
      <div class="habit-badge">${done?"완료":"미완"}</div>
    </div>`;
  }).join("")}

  <div class="week-card">
    <div class="week-label">최근 7일</div>
    <div class="week-grid">
      ${w7.map(d=>{
        const r=records[d]||{};
        const cnt=habits.filter(h=>r[h]).length;
        const pct=habits.length?cnt/habits.length:0;
        const bg=pct===0?"#f1f5f9":pct<0.5?"#fde68a":pct<0.8?"#6ee7b7":"#10b981";
        const textColor=pct>=0.5?"#065f46":"#92400e";
        const isToday=d===today;
        return `
        <div class="week-cell">
          <div class="week-box" style="background:${bg};border:${isToday?"2px solid #6366f1":"none"};color:${textColor}">
            ${pct>0?Math.round(pct*100)+"%":""}
          </div>
          <div class="week-day">${d.slice(5)}</div>
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

function buildStats(){
  const ms=monthlyStats();
  const l30=last30();
  const chartSVG=buildChart(ms);
  return `
  <div class="stat-card">
    <div class="stat-title">📈 월간 완료율 추이</div>
    ${ms.length===0
      ?`<div style="color:#888;text-align:center;padding:40px 0;font-size:14px">데이터가 아직 없습니다.<br>며칠 기록 후 그래프가 나타납니다.</div>`
      :chartSVG}
  </div>

  <div class="stat-card">
    <div class="stat-title">🏆 습관별 30일 달성률</div>
    ${habits.map(h=>{
      const done30=l30.filter(d=>records[d]&&records[d][h]).length;
      const rate30=Math.round(done30/30*100);
      const color=rate30>=80?"#10b981":rate30>=50?"#f59e0b":"#ef4444";
      return `
      <div class="bar-row">
        <div class="bar-row-top">
          <span class="bar-row-name">${h}</span>
          <span class="bar-row-pct" style="color:${color}">${rate30}%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${rate30}%;background:${color}"></div></div>
      </div>`;
    }).join("")}
  </div>

  <button class="export-btn" id="exportBtn">📥 Excel(CSV) 파일 저장</button>
  <div class="export-hint">Excel에서 열면 한국어로 자동 표시됩니다</div>`;
}

function buildChart(data){
  if(!data.length) return "";
  const W=560,H=200,pad={top:24,right:16,bottom:40,left:44};
  const cW=W-pad.left-pad.right, cH=H-pad.top-pad.bottom;
  const barW=Math.min(38, cW/data.length-6);
  const grids=[0,25,50,75,100];
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;overflow:visible">`;
  grids.forEach(v=>{
    const y=pad.top+cH-(v/100)*cH;
    svg+=`<line x1="${pad.left}" x2="${W-pad.right}" y1="${y}" y2="${y}" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="${v===0?"none":"4 3"}"/>`;
    svg+=`<text x="${pad.left-6}" y="${y+4}" text-anchor="end" fill="#94a3b8" font-size="10">${v}%</text>`;
  });
  data.forEach((d,i)=>{
    const x=pad.left+(i/data.length)*cW+(cW/data.length-barW)/2;
    const bH=(d.rate/100)*cH;
    const y=pad.top+cH-bH;
    const color=d.rate>=80?"#10b981":d.rate>=50?"#f59e0b":"#ef4444";
    svg+=`<rect x="${x}" y="${y}" width="${barW}" height="${bH||2}" rx="4" fill="${color}" opacity="0.85"/>`;
    svg+=`<text x="${x+barW/2}" y="${y-6}" text-anchor="middle" fill="${color}" font-size="11" font-weight="600">${d.rate}%</text>`;
    svg+=`<text x="${x+barW/2}" y="${H-6}" text-anchor="middle" fill="#64748b" font-size="10">${d.month.slice(5)}</text>`;
  });
  svg+=`</svg>`;
  return svg;
}

function buildManage(){
  return `
  <div class="manage-card">
    <div class="manage-title">➕ 새 습관 추가</div>
    <div class="add-row">
      <input class="add-input" id="newHabitInput" placeholder="새 습관 이름 입력..." maxlength="30"/>
      <button class="add-btn" id="addHabitBtn">추가</button>
    </div>
  </div>

  <div class="manage-card">
    <div class="manage-title">📝 습관 목록 (${habits.length}개)</div>
    ${habits.map((h,i)=>`
    <div class="habit-list-item" id="item-${i}">
      <span class="habit-num">${i+1}</span>
      ${editIdx===i
        ?`<input class="edit-input" id="editInput" value="${h.replace(/"/g,'&quot;')}"/>
           <button class="btn-save" data-saveidx="${i}" data-old="${encodeURIComponent(h)}">저장</button>`
        :`<span class="habit-list-name">${h}</span>
          <button class="btn-edit" data-editidx="${i}">수정</button>
          <button class="btn-del" data-del="${encodeURIComponent(h)}">삭제</button>`
      }
    </div>`).join("")}
  </div>

  <div class="notice">
    💾 데이터는 브라우저에 자동 저장됩니다.<br>
    브라우저 캐시 삭제 시 초기화될 수 있으니,<br>
    주기적으로 <strong>통계 탭 → Excel 저장</strong>을 권장합니다.
  </div>`;
}

// ── Events ─────────────────────────────────────────────────────────────────
function bindEvents(){
  // Tab switch
  document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      currentTab=btn.dataset.tab;
      editIdx=-1;
      render();
    });
  });

  // Toggle habit
  document.querySelectorAll(".habit-card").forEach(card=>{
    card.addEventListener("click",()=>{
      const h=decodeURIComponent(card.dataset.habit);
      const today=todayKey();
      if(!records[today])records[today]={};
      records[today][h]=!records[today][h];
      save();render();
    });
  });

  // Export
  const expBtn=document.getElementById("exportBtn");
  if(expBtn)expBtn.addEventListener("click",exportCSV);

  // Add habit
  const addBtn=document.getElementById("addHabitBtn");
  const addInput=document.getElementById("newHabitInput");
  function addHabit(){
    const v=addInput?addInput.value.trim():"";
    if(v&&!habits.includes(v)){habits.push(v);save();render();}
  }
  if(addBtn)addBtn.addEventListener("click",addHabit);
  if(addInput)addInput.addEventListener("keydown",e=>{if(e.key==="Enter")addHabit();});

  // Edit / Delete
  document.querySelectorAll(".btn-edit").forEach(btn=>{
    btn.addEventListener("click",()=>{editIdx=parseInt(btn.dataset.editidx);render();
      setTimeout(()=>{const inp=document.getElementById("editInput");if(inp)inp.focus();},50);
    });
  });
  document.querySelectorAll(".btn-save").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const inp=document.getElementById("editInput");
      const v=inp?inp.value.trim():"";
      const old=decodeURIComponent(btn.dataset.old);
      if(v&&v!==old){habits=habits.map(x=>x===old?v:x);}
      editIdx=-1;save();render();
    });
  });
  document.querySelectorAll(".btn-del").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const h=decodeURIComponent(btn.dataset.del);
      if(confirm(`"${h}" 항목을 삭제할까요?`)){
        habits=habits.filter(x=>x!==h);save();render();
      }
    });
  });
}

// ── Init ───────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
